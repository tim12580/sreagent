# =============================================================================
# SREAgent Deployment
# 无状态部署，支持水平扩展（注意：告警引擎需考虑分布式锁，单副本最安全）
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sreagent
  namespace: sreagent
  labels:
    app: sreagent
    version: v1.6.0
spec:
  # 单副本（告警引擎状态机）；若要多副本需在引擎层加分布式锁
  replicas: 1
  selector:
    matchLabels:
      app: sreagent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # 滚动更新期间保持零宕机
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sreagent
        version: v1.6.0
      annotations:
        # To trigger rolling restart on ConfigMap change, update this annotation manually:
        # kubectl annotate deployment sreagent --overwrite checksum/config=$(sha256sum configmap.yaml | cut -d' ' -f1)
        checksum/config: "manual"
    spec:
      terminationGracePeriodSeconds: 30

      # 确保 MySQL 和 Redis 就绪后再启动
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql-svc 3306; do
                echo "waiting for mysql..."; sleep 2
              done
              echo "mysql is ready"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."; sleep 2
              done
              echo "redis is ready"

      containers:
        - name: sreagent
          # ⚠ 必须替换：填入实际镜像地址，例如: johndoe/sreagent:latest 或 johndoe/sreagent:v1.0.5
          image: PLEASE_REPLACE/sreagent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          # 挂载配置文件
          volumeMounts:
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
            - name: logs
              mountPath: /app/logs

          # 只注入启动必需的敏感配置（AI/Lark 已移至 DB，不再需要 Secret 注入）
          env:
            - name: SREAGENT_DATABASE_HOST
              value: "mysql-svc"
            - name: SREAGENT_DATABASE_PORT
              value: "3306"
            - name: SREAGENT_REDIS_HOST
              value: "redis"
            - name: SREAGENT_REDIS_PORT
              value: "6379"
            - name: SREAGENT_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sreagent-secret
                  key: db-password
            - name: SREAGENT_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sreagent-secret
                  key: redis-password
            - name: SREAGENT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sreagent-secret
                  key: jwt-secret
            # 敏感字段 AES-256-GCM 加密主密钥（64 hex chars = 32 bytes）
            - name: SREAGENT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sreagent-secret
                  key: secret-key
            # 时区
            - name: TZ
              value: "Asia/Shanghai"
            # 开启 GORM SQL 调试（生产请设为 false）
            - name: SREAGENT_DB_DEBUG
              value: "false"
            # ⚠ 必须替换：填入实际访问域名，多个用逗号分隔
            - name: CORS_ALLOWED_ORIGINS
              value: "https://PLEASE_REPLACE.your-domain.com"

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: config
          configMap:
            name: sreagent-config
        - name: logs
          emptyDir: {}     # 日志写到 stdout/stderr，emptyDir 仅备用

      # 如镜像在私有仓库
      # imagePullSecrets:
      #   - name: dockerhub-secret
