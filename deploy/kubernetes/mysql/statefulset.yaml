# =============================================================================
# MySQL StatefulSet + Headless Service
# 使用 StatefulSet 保证 Pod 名称稳定、PVC 自动绑定
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: sreagent
  labels:
    app: mysql
spec:
  # ClusterIP: None → Headless Service，配合 StatefulSet 使用
  clusterIP: None
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
# 给应用访问用的普通 ClusterIP Service（带负载均衡，虽然单节点无意义）
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: sreagent
  labels:
    app: mysql
spec:
  type: ClusterIP
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: sreagent
  labels:
    app: mysql
spec:
  serviceName: mysql        # 对应 Headless Service 名称
  replicas: 1               # 生产可改为主从，此处单实例
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      terminationGracePeriodSeconds: 60

      # 初始化容器：确保数据目录权限正确
      initContainers:
        - name: init-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/mysql']
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          securityContext:
            runAsUser: 0

      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password

          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci

          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-config
              mountPath: /etc/mysql/conf.d/my.cnf
              subPath: my.cnf
            - name: mysql-logs
              mountPath: /var/log/mysql

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} --silent"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1'"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: mysql-config
          configMap:
            name: mysql-config
        - name: mysql-logs
          emptyDir: {}

  # PVC 模板：自动为每个 Pod 创建独立的持久卷
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: [ReadWriteOnce]
        # 根据你的集群修改 storageClassName
        # storageClassName: standard    # Minikube / Kind
        # storageClassName: gp3         # AWS EKS
        # storageClassName: premium-rwo # GKE / Azure
        resources:
          requests:
            storage: 20Gi
